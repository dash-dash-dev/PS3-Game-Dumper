name: "Publish Release"
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag in format x.y.z[-pre]"
        required: true
        type: string
env:
  dotnet_version: "10.0"
jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            configuration: Release
            target: "-windows"
            rid: win-x64
            command_extra: ""
          - os: ubuntu-latest
            configuration: Linux
            target: ""
            rid: linux-x64
            command_extra: ""
          - os: macos-latest
            configuration: MacOS
            target: ""
            rid: "osx-arm64"
            command_extra: "-t:BundleApp"
    runs-on: "${{ matrix.os }}"
    env:
      artifact_name: "PS3-Game-Dumper_vX.Y.Z.zip"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: "Resolve release version"
        id: version
        shell: pwsh
        run: |
          $versionFull = '${{ inputs.version || github.ref_name }}'
          if (-not $versionFull)
          {
            throw 'No version provided. Push a tag like v1.0.0 or provide a workflow_dispatch version input.'
          }

          $versionFull = $versionFull.TrimStart('v')
          $version = [SemVer]$versionFull
          $versionShort = "$($version.Major).$($version.Minor).$($version.Patch)"
          $isPrerelease = if ($version.PreRelease)
          {
            'true'
          }
          else
          {
            'false'
          }

          Write-Host "Building release version $versionFull"
          Write-Output "version_full=$versionFull" >> $env:GITHUB_OUTPUT
          Write-Output "version_short=$versionShort" >> $env:GITHUB_OUTPUT
          Write-Output "is_prerelease=$isPrerelease" >> $env:GITHUB_OUTPUT
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "${{ env.dotnet_version }}.x"
      - name: "Download current redump snapshot"
        shell: pwsh
        run: |
          $uri = 'http://redump.org/keys/ps3/'
          $response = Invoke-WebRequest -Uri $uri -Method HEAD
          $fname = $response.Headers['Content-Disposition'].Split('=', 2)[1].Trim('"')
          Invoke-WebRequest -Uri $uri -OutFile "$fname"
          Write-Host "Got $fname"
      - name: "Build release"
        run: >-
          dotnet publish
          -v:q
          --runtime ${{ matrix.rid }}
          --framework net${{ env.dotnet_version }}${{ matrix.target }}
          --self-contained
          --configuration ${{ matrix.configuration}}
          --output distrib
          UI.Avalonia/UI.Avalonia.csproj
          -p:PublishTrimmed=True
          -p:PublishSingleFile=True
          -p:DebugType=None
          -p:DebugSymbols=False
          -p:VersionPrefix=${{ steps.version.outputs.version_short }}
          -p:Version=${{ steps.version.outputs.version_full }}
          ${{ matrix.command_extra }}
      - name: "Make artifact"
        shell: pwsh
        run: |
          cd distrib
          Get-ChildItem -Recurse | Write-Host
          $artifact_name = "PS3-Game-Dumper_v${{ steps.version.outputs.version_full }}.zip"
          if ($IsWindows)
          {
            $artifact_name = "PS3-Game-Dumper_windows_v${{ steps.version.outputs.version_full }}.zip"
            Compress-Archive -LiteralPath PS3-Game-Dumper.exe -DestinationPath "$artifact_name" -CompressionLevel Optimal -Force
          }
          elseif ($IsLinux) # Compress-Archive does not preserve rwx attributes, so use zip on *nix
          {
            $artifact_name = "PS3-Game-Dumper_linux_v${{ steps.version.outputs.version_full }}.zip"
            zip -v9 "$artifact_name" PS3-Game-Dumper
          }
          elseif ($IsMacOs)
          {
            $artifact_name = "PS3-Game-Dumper_macos_v${{ steps.version.outputs.version_full }}.zip"
            codesign --deep -fs - 'PS3-Game-Dumper.app'
            zip -vr9 "$artifact_name" 'PS3-Game-Dumper.app/' -x '*.DS_Store'
          }
          Write-Output "artifact_name=$artifact_name" >> $env:GITHUB_ENV
      - name: "Create or update GitHub release draft"
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: ncipollo/release-action@v1
        with:
          commit: "${{ github.sha }}"
          tag: "v${{ steps.version.outputs.version_full }}"
          draft: true
          prerelease: ${{ steps.version.outputs.is_prerelease }}
          allowUpdates: true
          artifactErrorsFailBuild: true
          generateReleaseNotes: true
          artifacts: "distrib/PS3-Game-Dumper_*.zip"
          artifactContentType: application/zip
          replacesArtifacts: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true
      - name: "Create or update GitHub release"
        if: ${{ github.event_name == 'push' }}
        uses: ncipollo/release-action@v1
        with:
          tag: "v${{ steps.version.outputs.version_full }}"
          draft: false
          prerelease: ${{ steps.version.outputs.is_prerelease }}
          allowUpdates: true
          artifactErrorsFailBuild: true
          generateReleaseNotes: true
          artifacts: "distrib/PS3-Game-Dumper_*.zip"
          artifactContentType: application/zip
          replacesArtifacts: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
